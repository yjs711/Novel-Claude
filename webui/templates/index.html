<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel-Claude · 写作工作室</title>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface2: #f1f3f5;
    --border: #e9ecef;
    --text: #212529;
    --text2: #868e96;
    --text3: #adb5bd;
    --primary: #4263eb;
    --primary-hover: #3b5bdb;
    --primary-light: #edf2ff;
    --success: #2b8a3e;
    --warning: #e67700;
    --danger: #c92a2a;
    --accent: #be4bdb;
    --radius: 8px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --sidebar: 220px;
    --editor-max: 720px;
    --font-sans: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    --font-serif: "Noto Serif SC","Source Han Serif SC",Georgia,serif;
    --font-mono: "JetBrains Mono","Fira Code",monospace;
  }
  * { box-sizing:border-box;margin:0;padding:0 }
  body { font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.6;height:100vh;display:flex;overflow:hidden }
  a { color:var(--primary);text-decoration:none }
  button { cursor:pointer;font-family:inherit;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:13px;transition:background 0.15s,color 0.15s }
  .btn-primary { background:var(--primary);color:#fff }
  .btn-primary:hover { background:var(--primary-hover) }
  .btn-secondary { background:var(--surface2);color:var(--text) }
  .btn-secondary:hover { background:var(--border) }
  .btn-danger { background:var(--danger);color:#fff }
  .btn-sm { padding:4px 10px;font-size:12px }
  input,select,textarea { font-family:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s }
  input:focus,select:focus,textarea:focus { border-color:var(--primary) }
  .badge { display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600 }
  .badge-ok { background:var(--success-light);color:var(--success) }
  .badge-warn { background:var(--warning-light);color:var(--warning) }
  .badge-err { background:#fff5f5;color:var(--danger) }
  ::-webkit-scrollbar { width:5px }
  ::-webkit-scrollbar-thumb { background:var(--text3);border-radius:3px }

  /* Layout: three-column */
  .layout { display:flex;width:100%;height:100% }

  /* Left sidebar */
  .sidebar { width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0 }
  .sidebar-header { padding:16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px }
  .sidebar-header .dot { width:8px;height:8px;border-radius:50%;background:var(--success) }
  .sidebar-nav { flex:1;overflow-y:auto;padding:8px }
  .sidebar-nav button { display:block;width:100%;text-align:left;padding:8px 12px;margin-bottom:2px;background:transparent;border-radius:var(--radius-sm);font-size:13px;color:var(--text2) }
  .sidebar-nav button:hover,.sidebar-nav button.active { background:var(--primary-light);color:var(--primary) }
  .sidebar-footer { padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3) }

  /* Main area */
  .main { flex:1;display:flex;flex-direction:column;overflow:hidden }
  .toolbar { padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0 }
  .toolbar .sep { width:1px;height:20px;background:var(--border);margin:0 4px }
  .toolbar .status { margin-left:auto;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px }
  .content { flex:1;display:flex;overflow:hidden }

  /* Editor panel */
  .editor-panel { flex:1;overflow-y:auto;padding:24px 32px;display:flex;justify-content:center }
  .editor-inner { max-width:var(--editor-max);width:100% }
  .editor-inner h2 { font-size:20px;margin-bottom:16px }
  .editor-inner textarea { width:100%;min-height:400px;font-family:var(--font-serif);font-size:16px;line-height:1.8;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);resize:vertical }
  .editor-inner textarea:focus { border-color:var(--primary) }
  .editor-inner .output { font-family:var(--font-serif);font-size:16px;line-height:1.8;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);white-space:pre-wrap;min-height:400px }

  /* Right panel */
  .right-panel { width:280px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column }
  .right-panel section { padding:16px;border-bottom:1px solid var(--border) }
  .right-panel h4 { font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:8px }
  .right-panel .card { background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;font-size:13px }
  .right-panel .metric { display:flex;justify-content:space-between;align-items:center;padding:4px 0 }
  .right-panel .metric-val { font-weight:700;font-size:18px }
  .right-panel .log-line { font-size:11px;color:var(--text2);padding:2px 0;border-bottom:1px solid var(--surface2);font-family:var(--font-mono) }

  /* Dashboard grid */
  .dashboard { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:24px }
  .dash-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px }
  .dash-card h3 { font-size:13px;color:var(--text2);margin-bottom:4px }
  .dash-card .big { font-size:28px;font-weight:700 }
  .dash-card.large { grid-column:span 2 }

  /* Toasts */
  .toast { position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;z-index:999;animation:slideUp 0.3s ease }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .toast-ok { background:var(--success-light);color:var(--success) }
  .toast-err { background:#fff5f5;color:var(--danger) }
</style>
</head>
<body>
<div class="layout">
  <!-- Left Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header"><span class="dot"></span>Novel-Claude</div>
    <div class="sidebar-nav" id="sidebarNav">
      <button class="active" data-tab="write">✍️ 写作</button>
      <button data-tab="outline">📋 大纲</button>
      <button data-tab="dashboard">📊 面板</button>
      <button data-tab="files">📁 文件</button>
      <button data-tab="settings">⚙️ 设置</button>
    </div>
    <div class="sidebar-footer" id="sidebarStatus">加载中…</div>
  </nav>

  <!-- Main Area -->
  <div class="main">
    <div class="toolbar">
      <select id="genreSelect" style="width:80px"><option>修仙</option><option>玄幻</option><option>都市</option></select>
      <select id="volumeSelect" style="width:60px"><option>1</option></select>
      <input id="chapterInput" type="number" value="1" min="1" style="width:60px">
      <button class="btn-primary" onclick="startWrite()">生成章节</button>
      <span class="sep"></span>
      <button class="btn-secondary btn-sm" onclick="loadStatus()">刷新</button>
      <div class="status">
        <span id="modelStatus">模型: --</span>
        <span id="wordCount">字数: 0</span>
      </div>
    </div>

    <div class="content" id="mainContent">
      <!-- Write Tab -->
      <div class="editor-panel" id="tab-write">
        <div class="editor-inner">
          <h2 id="chapterTitle">章节标题</h2>
          <div id="editorOutput" class="output">点击"生成章节"开始创作…</div>
          <div style="margin-top:12px;display:flex;gap:8px">
            <button class="btn-primary btn-sm" onclick="startWrite()">生成</button>
            <button class="btn-secondary btn-sm" onclick="analyzeChapter()">分析</button>
            <button class="btn-secondary btn-sm" onclick="exportChapter()">导出</button>
          </div>
        </div>
      </div>
      <!-- Outline Tab -->
      <div class="editor-panel" id="tab-outline" style="display:none">
        <div class="editor-inner">
          <h2>大纲管理</h2>
          <textarea id="outlineText" placeholder="在此编辑大纲…" style="min-height:300px"></textarea>
          <div style="margin-top:8px;display:flex;gap:8px">
            <button class="btn-primary btn-sm" onclick="saveOutline()">保存</button>
            <button class="btn-secondary btn-sm" onclick="loadOutline()">加载</button>
          </div>
        </div>
      </div>
      <!-- Dashboard Tab -->
      <div class="dashboard" id="tab-dashboard" style="display:none">
        <div class="dash-card"><h3>总字数</h3><div class="big" id="dashTotalWords">0</div></div>
        <div class="dash-card"><h3>已完成章</h3><div class="big" id="dashChapters">0</div></div>
        <div class="dash-card"><h3>角色数</h3><div class="big" id="dashChars">0</div></div>
        <div class="dash-card"><h3>剧情线</h3><div class="big" id="dashThreads">0</div></div>
        <div class="dash-card large"><h3>最近质量门控</h3><div id="dashGate">--</div></div>
        <div class="dash-card large"><h3>叙事多样性</h3><div id="dashDiversity">--</div></div>
      </div>
      <!-- Files Tab -->
      <div class="editor-panel" id="tab-files" style="display:none">
        <div class="editor-inner"><h2>项目管理</h2><div id="fileList">加载中…</div></div>
      </div>
      <!-- Settings Tab -->
      <div class="editor-panel" id="tab-settings" style="display:none">
        <div class="editor-inner">
          <h2>设置</h2>
          <div class="card" style="margin-bottom:12px">
            <label>体裁 <select id="cfgGenre"></select></label>
            <label style="margin-left:12px">风格 <select id="cfgStyle"></select></label>
            <label style="margin-left:12px">模式 <select id="cfgMode"><option>quick</option><option>standard</option><option>deep</option></select></label>
            <button class="btn-primary btn-sm" style="margin-left:12px" onclick="saveSettings()">保存</button>
          </div>
          <div class="card">
            <h4>故事结构 (NCP)</h4>
            <select id="cfgStoryform"><option value="">无</option><option value="revenge">复仇悲剧 (哈姆雷特)</option><option value="rise_to_power">英雄之旅 (星球大战)</option><option value="fanren">凡人流逆袭 (凡人修仙传)</option><option value="guimi">克苏鲁扮演法 (诡秘之主)</option><option value="dageng">案件驱动 (大奉打更人)</option></select>
            <button class="btn-primary btn-sm" onclick="saveStoryform()">应用</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <aside class="right-panel">
    <section>
      <h4>项目状态</h4>
      <div class="card">
        <div class="metric"><span>连接</span><span class="badge badge-ok" id="rpConnected">--</span></div>
        <div class="metric"><span>模型</span><span id="rpModel" style="font-size:12px">--</span></div>
        <div class="metric"><span>质量门控</span><span id="rpGate" style="font-size:12px">--</span></div>
      </div>
    </section>
    <section>
      <h4>最近操作</h4>
      <div id="rpLog" style="max-height:200px;overflow-y:auto">
        <div class="log-line">等待操作…</div>
      </div>
    </section>
    <section>
      <h4>快捷操作</h4>
      <button class="btn-secondary btn-sm" style="width:100%;margin-bottom:4px" onclick="snapshotSave()">保存快照</button>
      <button class="btn-secondary btn-sm" style="width:100%;margin-bottom:4px" onclick="exportEpub()">导出 EPUB</button>
      <button class="btn-secondary btn-sm" style="width:100%" onclick="analyzeAll()">全本分析</button>
    </section>
  </aside>
</div>
<div id="toastContainer"></div>

<script>
// ── Tab switching ──
document.querySelectorAll('#sidebarNav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sidebarNav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    ['write','outline','dashboard','files','settings'].forEach(t => {
      document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
    });
    if (tab==='dashboard') loadDashboard();
    if (tab==='files') loadFiles();
    if (tab==='settings') loadSettingsPanel();
  });
});

// ── Toast ──
function toast(msg, ok=true) {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = `toast ${ok?'toast-ok':'toast-err'}`;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

// ── API helpers ──
async function api(url, opts={}) {
  try { const r = await fetch(url, opts); return r.ok ? r.json() : null; }
  catch(e) { toast('网络错误: '+e.message, false); return null; }
}

// ── Status ──
async function loadStatus() {
  const r = await api('/api/status');
  if (!r) return;
  document.getElementById('modelStatus').textContent = '模型: '+r.provider;
  document.getElementById('wordCount').textContent = '字数: '+(r.chapters||[]).reduce((s,c)=>s+(c.words||0),0);
  document.getElementById('sidebarStatus').textContent = r.title||'未命名项目';
  document.getElementById('rpConnected').textContent = r.connected?'在线':'离线';
  document.getElementById('rpConnected').className = r.connected?'badge badge-ok':'badge badge-err';
  document.getElementById('rpModel').textContent = r.model||'--';
  const gate = r.last_gate;
  document.getElementById('rpGate').textContent = gate ? `${gate.score}分 ${gate.verdict}` : '无记录';
  document.getElementById('rpGate').className = gate&&gate.verdict==='PASS'?'badge badge-ok':'badge badge-warn';
  rpLog('状态刷新');
}
function rpLog(msg) {
  const el = document.getElementById('rpLog');
  const t = new Date().toLocaleTimeString();
  el.innerHTML += `<div class="log-line">${t} ${msg}</div>`;
  if (el.children.length > 20) el.firstElementChild.remove();
}

// ── Write ──
async function startWrite() {
  const vol = parseInt(document.getElementById('volumeSelect').value);
  const ch = parseInt(document.getElementById('chapterInput').value);
  const mode = document.getElementById('cfgMode')?.value || 'quick';
  const output = document.getElementById('editorOutput');
  output.textContent = '生成中…';
  rpLog(`开始生成 V${vol}C${ch}`);

  try {
    const r = await fetch(`/api/write-stream?mode=${mode}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({volume:vol, chapter:ch})
    });
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      for (const line of text.split('\n')) {
        if (line.startsWith('data: ')) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.type==='stream'||d.type==='token') { full += d.text||d.token; output.textContent = full; }
            else if (d.type==='done'||d.type==='complete') {
              output.textContent = full || d.path || '完成';
              document.getElementById('chapterInput').value = ch+1;
              const ws = d.words||full.length;
              toast(`生成完成: ${ws}字`, true);
              rpLog(`V${vol}C${ch} 完成 (${ws}字, gate:${d.gate_verdict||'none'})`);
            }
            else if (d.type==='error') { output.textContent = '错误: '+d.msg; toast(d.msg, false); }
            else if (d.type==='agent_progress') { output.textContent = `Agent: ${d.stage} (${Math.round(d.progress*100)}%)`; }
            else if (d.type==='agent_result') {
              output.textContent = full;
              toast(`${d.score}分, ${d.revision_rounds||0}轮修订`, d.score>=70);
            }
            else if (d.type==='status') { output.textContent = d.msg; }
          } catch(e) {}
        }
      }
    }
  } catch(e) { toast('生成失败: '+e.message, false); }
}

// ── Dashboard ──
async function loadDashboard() {
  const r = await api('/api/status');
  if (!r) return;
  document.getElementById('dashTotalWords').textContent = (r.chapters||[]).reduce((s,c)=>s+(c.words||0),0).toLocaleString();
  document.getElementById('dashChapters').textContent = r.chapter_count||0;
  document.getElementById('dashChars').textContent = r.char_count||0;
  document.getElementById('dashThreads').textContent = r.thread_count||0;
  if (r.last_gate) {
    document.getElementById('dashGate').innerHTML = `<b>${r.last_gate.score}分 (${r.last_gate.verdict})</b> · 第${r.last_gate.round}轮 · 严重问题:${r.last_gate.critical}`;
  }
  // Load diversity
  const d = await api('/api/diversity');
  if (d && d.score!==undefined) {
    document.getElementById('dashDiversity').innerHTML = `<b>${d.score}/100</b> · ${d.chapters?.length||0}章分析 · ${d.issues?.[0]||'无问题'}`;
  }
}

// ── Files ──
async function loadFiles() {
  const r = await api('/api/files/list');
  if (!r) return;
  document.getElementById('fileList').innerHTML = r.files ? r.files.map(f=>`<div style="padding:4px 0;border-bottom:1px solid var(--border)">${f}</div>`).join('') : '无文件';
}

// ── Settings ──
async function loadSettingsPanel() {
  const r = await api('/api/config');
  if (!r) return;
  document.getElementById('cfgGenre').innerHTML = (r.genres||['修仙','玄幻','都市']).map(g=>`<option>${g}</option>`).join('');
  document.getElementById('cfgStyle').innerHTML = (r.styles||['网文爽文','古龙风格']).map(s=>`<option>${s}</option>`).join('');
}
async function saveSettings() {
  const genre = document.getElementById('cfgGenre').value;
  const style = document.getElementById('cfgStyle').value;
  const mode = document.getElementById('cfgMode').value;
  await api('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({genre,style,workflow:{mode}})});
  toast('设置已保存');
}
async function saveStoryform() {
  const tpl = document.getElementById('cfgStoryform').value;
  if (!tpl) return;
  await api('/api/storyform', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({template:tpl})});
  toast('故事结构已应用');
}

// ── Quick actions ──
async function analyzeChapter() {
  const r = await api('/api/analyze');
  if (r?.report) toast(`分析完成: ${r.report.total_chapters}章, ${r.report.total_words}字`);
}
async function exportChapter() {
  const r = await api('/api/export', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({format:'epub'})});
  if (r?.ok) toast(`导出: ${r.path}`);
}
async function analyzeAll() {
  const r = await api('/api/analyze');
  if (r?.report) {
    const reps = r.report;
    toast(`${reps.total_chapters}章 · ${reps.total_words.toLocaleString()}字 · ${reps.pacing_issues?.length||0}节奏问题`);
  }
}
async function exportEpub() {
  const r = await api('/api/export', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({format:'epub'})});
  if (r?.ok) toast(`EPUB已生成: ${r.path}`);
}
async function snapshotSave() {
  const r = await api('/api/snapshots', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({label:new Date().toLocaleString()})});
  if (r?.ok) toast('快照已保存');
}
async function loadOutline() {
  const r = await api('/api/outline');
  if (r?.outline) document.getElementById('outlineText').value = r.outline;
}
async function saveOutline() {
  const text = document.getElementById('outlineText').value;
  await api('/api/outline', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content:text})});
  toast('大纲已保存');
}

// ── Init ──
loadStatus();
setInterval(loadStatus, 30000); // auto-refresh every 30s
</script>
</body>
</html>
