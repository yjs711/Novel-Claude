<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel-Claude · 写作工作室</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e8e8ec;
  --text: #1d1d1f;
  --text2: #86868b;
  --text3: #c7c7cc;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-light: #e8f0fe;
  --success: #34c759;
  --success-light: #e8f8ee;
  --danger: #ff3b30;
  --danger-light: #ffeeed;
  --radius: 10px;
  --radius-sm: 6px;
  --font: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
  --serif: Georgia, "Noto Serif SC", serif;
  --mono: "SF Mono", "Fira Code", monospace;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --panel-left: 260px;
  --panel-right: 280px;
  --transition: 0.2s;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
button { cursor: pointer; font-family: inherit; border: none; border-radius: var(--radius-sm); padding: 6px 14px; font-size: 13px; transition: var(--transition); }
input, select, textarea { font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; outline: none; background: var(--surface); color: var(--text); }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 3px 10px; font-size: 12px; }
.btn-xs { padding: 2px 8px; font-size: 11px; }
.btn-block { width: 100%; margin-bottom: 4px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.bg-ok { background: var(--success-light); color: var(--success); }
.bg-warn { background: #fff3cd; color: #856404; }
.bg-err { background: var(--danger-light); color: var(--danger); }

/* Layout */
.layout { display: flex; width: 100%; height: 100vh; }
.panel { display: flex; flex-direction: column; background: var(--surface); transition: var(--transition); }
.panel-header { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px; }
.panel-header-title { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.panel-toggle { margin-left: auto; background: none; border: none; color: var(--text3); padding: 2px 6px; font-size: 14px; cursor: pointer; transition: var(--transition); }
.panel-toggle:hover { color: var(--text); }
.panel-body { flex: 1; overflow-y: auto; }

/* Left panel */
.panel-left { width: var(--panel-left); border-right: 1px solid var(--border); flex-shrink: 0; }
.panel-left.collapsed { width: 42px; }
.panel-left.collapsed .panel-header { flex-direction: column; justify-content: flex-start; padding: 8px 6px; }
.panel-left.collapsed .panel-body { display: none; }
.panel-left.collapsed .panel-header-title { writing-mode: vertical-lr; font-size: 11px; padding: 4px 0; }
.panel-left.collapsed .panel-toggle { margin-left: 0; margin-top: auto; font-size: 16px; }

/* Write panel */
.panel-write { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* Right panels */
.panel-right { width: var(--panel-right); border-left: 1px solid var(--border); flex-shrink: 0; }
.panel-right.collapsed { width: 42px; }
.panel-right.collapsed .panel-header { flex-direction: column; justify-content: flex-start; padding: 8px 6px; }
.panel-right.collapsed .panel-body { display: none; }
.panel-right.collapsed .panel-header-title { writing-mode: vertical-lr; font-size: 11px; padding: 4px 0; }
.panel-right.collapsed .panel-toggle { margin-left: 0; margin-top: auto; font-size: 16px; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; font-size: 13px; }
.toolbar select { width: 85px; padding: 4px 8px; font-size: 12px; }
.toolbar input[type=number] { width: 55px; padding: 4px 8px; font-size: 12px; }
.toolbar input[type=text] { width: 120px; padding: 4px 8px; font-size: 12px; }
.toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.toolbar .mode-group { display: flex; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
.toolbar .mode-group button { border-radius: 0; border: none; padding: 4px 12px; font-size: 12px; background: var(--surface); color: var(--text2); }
.toolbar .mode-group button.active { background: var(--accent); color: #fff; }
.toolbar .mode-group button:not(:last-child) { border-right: 1px solid var(--border); }

/* Editor */
.editor-wrap { flex: 1; display: flex; justify-content: center; padding: 20px 24px; overflow-y: auto; }
.editor-inner { max-width: 820px; width: 100%; display: flex; flex-direction: column; gap: 8px; }
.editor-textarea { width: 100%; min-height: 500px; font-family: var(--serif); font-size: 18px; line-height: 2; padding: 28px 36px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); outline: none; resize: vertical; color: var(--text); box-shadow: var(--shadow-sm); }
.editor-textarea:focus { border-color: var(--accent); }
.editor-status { display: flex; gap: 16px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }

/* Left panel sections */
.left-section { border-bottom: 1px solid var(--border); }
.left-section-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
.left-section-header:hover { background: var(--bg); }
.left-section-body { padding: 4px 10px 10px; }
.chapter-item { padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; transition: var(--transition); }
.chapter-item:hover { background: var(--accent-light); }
.chapter-item .ch-num { color: var(--text2); min-width: 30px; }
.chapter-item .ch-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0 6px; }
.chapter-item .ch-words { color: var(--text3); font-size: 11px; }
.vol-header { padding: 4px 10px 2px; font-size: 11px; font-weight: 700; color: var(--text3); margin-top: 4px; }

/* Wizard overlay */
.wizard-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
.wizard-card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); max-width: 720px; width: 90%; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
.wizard-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.wizard-steps { display: flex; gap: 4px; flex: 1; }
.wiz-step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; background: var(--bg); color: var(--text3); transition: var(--transition); }
.wiz-step-dot.active { background: var(--accent); color: #fff; }
.wiz-step-dot.done { background: var(--success); color: #fff; }
.wizard-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.wizard-step { display: none; }
.wizard-step.active { display: block; }
.wizard-footer { padding: 12px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.wizard-footer .spacer { flex: 1; }
.wizard-ai-discuss { margin-top: 16px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.wizard-ai-discuss .ai-header { padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; background: var(--bg); }
.wizard-ai-discuss .ai-body { padding: 8px; display: none; }
.wizard-ai-discuss .ai-body.open { display: block; }
.wiz-chat-msgs { max-height: 200px; overflow-y: auto; margin-bottom: 8px; }
.wiz-chat-msg { padding: 4px 8px; margin: 2px 0; border-radius: var(--radius-sm); font-size: 12px; }
.wiz-chat-msg.user { background: var(--accent-light); text-align: right; }
.wiz-chat-msg.ai { background: var(--bg); }
.wiz-chat-input { display: flex; gap: 6px; }
.wiz-chat-input input { flex: 1; padding: 4px 8px; font-size: 12px; }

/* Wizard fields */
.wiz-field { margin-bottom: 12px; }
.wiz-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.wiz-field input, .wiz-field select, .wiz-field textarea { width: 100%; }
.wiz-field textarea { min-height: 60px; font-size: 13px; }
.wiz-field [contenteditable] { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; min-height: 80px; font-size: 13px; line-height: 1.6; outline: none; }
.wiz-field [contenteditable]:focus { border-color: var(--accent); }

/* Outline panel tabs */
.tab-bar { display: flex; border-bottom: 1px solid var(--border); }
.tab-bar button { flex: 1; padding: 6px 0; font-size: 12px; background: none; color: var(--text2); border: none; border-bottom: 2px solid transparent; transition: var(--transition); }
.tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; flex: 1; flex-direction: column; }
.tab-content.active { display: flex; }
.tab-content textarea { width: 100%; min-height: 200px; font-size: 12px; font-family: var(--mono); border: none; border-radius: 0; padding: 10px 14px; resize: vertical; }
.tab-content .tab-actions { padding: 8px 14px; display: flex; gap: 6px; flex-wrap: wrap; }

/* Inspire modules */
.inspire-module { border-bottom: 1px solid var(--border); }
.inspire-header { padding: 8px 14px; font-size: 11px; font-weight: 700; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: var(--transition); }
.inspire-header:hover { background: var(--bg); }
.inspire-header .arrow { transition: var(--transition); font-size: 10px; }
.inspire-header.collapsed .arrow { transform: rotate(-90deg); }
.inspire-body { padding: 8px 14px; }
.inspire-body.collapsed { display: none; }
.inspire-body textarea { width: 100%; min-height: 50px; font-size: 12px; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); resize: vertical; }
.inspire-body .btn-row { display: flex; gap: 4px; margin-top: 6px; }
.inspire-body .output-box { font-size: 12px; line-height: 1.6; padding: 6px 8px; margin-top: 6px; background: var(--bg); border-radius: var(--radius-sm); min-height: 30px; white-space: pre-wrap; }

/* Chat (inspire) */
.chat-messages { max-height: 250px; overflow-y: auto; margin-bottom: 8px; }
.chat-msg { padding: 6px 10px; margin: 3px 0; border-radius: var(--radius-sm); font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
.chat-msg.user { background: var(--accent-light); text-align: right; }
.chat-msg.ai { background: var(--bg); }
.chat-input-row { display: flex; gap: 6px; padding: 8px 0; }
.chat-input-row input { flex: 1; padding: 6px 10px; font-size: 12px; }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 99; display: flex; align-items: center; justify-content: center; }
.modal-card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); padding: 20px 24px; max-width: 400px; width: 90%; }
.modal-card h3 { font-size: 16px; margin-bottom: 12px; }
.modal-card .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* Toast */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13px; box-shadow: var(--shadow); animation: slideUp 0.3s ease; max-width: 360px; }
.toast.ok { background: var(--success-light); color: var(--success); border: 1px solid var(--success); }
.toast.err { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger); }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Foreshadowing stats */
.fs-stats { display: flex; gap: 8px; font-size: 12px; color: var(--text2); padding: 4px 14px; }
.fs-stats span { flex: 1; text-align: center; }
.fs-stats .num { display: block; font-size: 18px; font-weight: 700; color: var(--text); }

/* Gate score display */
.gate-display { padding: 6px 14px; font-size: 12px; }
.gate-display .score { font-size: 24px; font-weight: 700; }
.gate-display .detail { color: var(--text2); font-size: 11px; }

/* Focus mode */
.focus-mode .panel-left { display: none; }
.focus-mode .panel-right { display: none; }
.focus-mode .editor-wrap { padding: 40px 80px; }
.focus-mode .editor-inner { max-width: 720px; }

/* Utility */
.hidden { display: none !important; }
.flex-1 { flex: 1; }
.text-right { text-align: right; }
.mt-4 { margin-top: 4px; }
.mt-8 { margin-top: 8px; }
.gap-4 { gap: 4px; }
</style>
</head>
<body>
<div class="layout">

<!-- ─── Panel Left: 章节目录 ─── -->
<div class="panel panel-left" id="panelLeft">
  <div class="panel-header">
    <span class="panel-header-title">章节目录</span>
    <button class="panel-toggle" onclick="togglePanel('panelLeft')">&#9776;</button>
  </div>
  <div class="panel-body">
    <!-- 章节列表 -->
    <div class="left-section">
      <div class="left-section-header" onclick="this.nextElementSibling.classList.toggle('hidden')">章节列表 <span>&#9660;</span></div>
      <div class="left-section-body" id="chapterList"></div>
    </div>
    <!-- 故事蓝图 -->
    <div class="left-section">
      <div class="left-section-header">故事蓝图</div>
      <div class="left-section-body" style="display:flex;gap:6px;padding:6px 10px 10px">
        <button class="btn-secondary btn-sm" onclick="showWizard()" style="flex:1">新建故事</button>
        <button class="btn-secondary btn-sm" onclick="showWizard()" style="flex:1">重新规划</button>
      </div>
    </div>
    <!-- 新章按钮 -->
    <div class="left-section" style="padding:6px 10px">
      <button class="btn-primary btn-sm btn-block" onclick="showNewChapterModal()">+ 新章</button>
    </div>
    <!-- 故事引擎 -->
    <div class="left-section">
      <div class="left-section-header">故事引擎</div>
      <div class="left-section-body" id="engineInfo" style="font-size:12px;color:var(--text2);line-height:1.6"></div>
    </div>
    <!-- 质量仪表 -->
    <div class="left-section">
      <div class="left-section-header">质量仪表</div>
      <div class="left-section-body" id="gateInfo" style="font-size:12px"></div>
    </div>
  </div>
</div>

<!-- ─── Panel Center: 写作区 ─── -->
<div class="panel panel-write">
  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <select id="selGenre" title="体裁"></select>
    <select id="selStyle" title="风格"></select>
    <span class="sep"></span>
    <input type="number" id="selVolume" value="1" min="1" style="width:50px" title="卷号">
    <span style="color:var(--text3)">卷</span>
    <input type="number" id="selChapter" value="1" min="1" style="width:50px" title="章号">
    <span style="color:var(--text3)">章</span>
    <span class="sep"></span>
    <div class="mode-group">
      <button id="modeQuick" class="active" onclick="switchMode('quick')">Quick</button>
      <button id="modeStandard" onclick="switchMode('standard')">Standard</button>
      <button id="modeDeep" onclick="switchMode('deep')">Deep</button>
    </div>
    <span class="sep"></span>
    <button class="btn-primary btn-sm" onclick="doGenerate()">生成</button>
    <button class="btn-secondary btn-sm" onclick="doPause()" id="btnPause" style="display:none">暂停</button>
    <button class="btn-secondary btn-sm" onclick="doRewrite()">AI改写</button>
    <button class="btn-secondary btn-sm" onclick="toggleWizard()">故事蓝图</button>
    <button class="btn-secondary btn-sm" onclick="doSaveSnapshot()">保存快照</button>
    <span class="sep"></span>
    <button class="btn-secondary btn-xs" onclick="toggleFocus()" title="专注模式">专注</button>
    <span id="tbStatus" style="margin-left:auto;font-size:11px;color:var(--text3)"></span>
  </div>

  <!-- Editor -->
  <div class="editor-wrap" id="editorWrap">
    <div class="editor-inner">
      <textarea class="editor-textarea" id="editorTextarea" placeholder="在此写作，或点击「生成」让AI帮你写。每30秒自动保存。"></textarea>
      <div class="editor-status">
        <span>字数: <b id="statWords">0</b></span>
        <span>速度: <b id="statSpeed">0</b> 字/分</span>
        <span>用时: <b id="statTime">00:00</b></span>
        <span>门控: <b id="statGate">--</b></span>
        <span style="margin-left:auto" id="statSave">就绪</span>
      </div>
    </div>
  </div>

  <!-- Wizard overlay (initially hidden) -->
  <div class="wizard-overlay hidden" id="wizardOverlay" onclick="if(event.target===this)hideWizard()">
    <div class="wizard-card">
      <div class="wizard-header">
        <div class="wizard-steps" id="wizardSteps">
          <div class="wiz-step-dot active" id="wsd-0">1</div>
          <div class="wiz-step-dot" id="wsd-1">2</div>
          <div class="wiz-step-dot" id="wsd-2">3</div>
          <div class="wiz-step-dot" id="wsd-3">4</div>
          <div class="wiz-step-dot" id="wsd-4">5</div>
        </div>
        <button class="btn-secondary btn-sm" onclick="hideWizard()" style="background:none;color:var(--text3);font-size:18px">&times;</button>
      </div>
      <div class="wizard-body" id="wizardBody">
        <!-- Step 0: 起点 -->
        <div class="wizard-step active" id="wizs-0">
          <div class="wiz-field">
            <label>书名 *</label>
            <input type="text" id="wizBookName" placeholder="输入小说书名">
          </div>
          <div class="wiz-field">
            <label>体裁</label>
            <select id="wizGenre"></select>
          </div>
          <div class="wiz-field">
            <label>风格</label>
            <select id="wizStyle"></select>
          </div>
          <div class="wiz-field">
            <label>一句话简介</label>
            <textarea id="wizBlurb" placeholder="用一句话概括你的故事"></textarea>
          </div>
          <div class="wizard-ai-discuss">
            <div class="ai-header" onclick="this.nextElementSibling.classList.toggle('open')">&#128172; 与AI讨论</div>
            <div class="ai-body">
              <div class="wiz-chat-msgs" id="wizChat-start"></div>
              <div class="wiz-chat-input">
                <input type="text" id="wizChatInput-start" placeholder="和AI讨论你的故事起点..." onkeydown="if(event.key==='Enter')sendWizardChat('start')">
                <button class="btn-primary btn-sm" onclick="sendWizardChat('start')">发送</button>
              </div>
            </div>
          </div>
        </div>
        <!-- Step 1: 世界观 -->
        <div class="wizard-step" id="wizs-1">
          <div class="wiz-field">
            <label>故事引擎约束</label>
            <div style="font-size:12px;color:var(--text2);line-height:1.6" id="wizEngineConstraints"></div>
          </div>
          <div class="wiz-field">
            <label>世界观设定</label>
            <div contenteditable="true" id="wizWorldOutput" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;min-height:80px;font-size:13px;line-height:1.6"></div>
          </div>
          <button class="btn-primary btn-sm" onclick="generateWorldSetting()">AI生成世界观</button>
          <button class="btn-secondary btn-sm" onclick="saveWizardAsset('world')" style="margin-left:6px">保存到项目</button>
          <div class="wizard-ai-discuss" style="margin-top:12px">
            <div class="ai-header" onclick="this.nextElementSibling.classList.toggle('open')">&#128172; 与AI讨论</div>
            <div class="ai-body">
              <div class="wiz-chat-msgs" id="wizChat-world"></div>
              <div class="wiz-chat-input">
                <input type="text" id="wizChatInput-world" placeholder="讨论世界观..." onkeydown="if(event.key==='Enter')sendWizardChat('world')">
                <button class="btn-primary btn-sm" onclick="sendWizardChat('world')">发送</button>
              </div>
            </div>
          </div>
        </div>
        <!-- Step 2: 力量体系 -->
        <div class="wizard-step" id="wizs-2">
          <div class="wiz-field">
            <label>力量体系设定</label>
            <div contenteditable="true" id="wizPowerOutput" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;min-height:80px;font-size:13px;line-height:1.6"></div>
          </div>
          <button class="btn-primary btn-sm" onclick="generatePowerSystem()">AI生成力量体系</button>
          <button class="btn-secondary btn-sm" onclick="saveWizardAsset('power')" style="margin-left:6px">保存到项目</button>
          <div class="wizard-ai-discuss" style="margin-top:12px">
            <div class="ai-header" onclick="this.nextElementSibling.classList.toggle('open')">&#128172; 与AI讨论</div>
            <div class="ai-body">
              <div class="wiz-chat-msgs" id="wizChat-power"></div>
              <div class="wiz-chat-input">
                <input type="text" id="wizChatInput-power" placeholder="讨论力量体系..." onkeydown="if(event.key==='Enter')sendWizardChat('power')">

<script>
// ── Utils ──
function el(id) { return document.getElementById(id); }

function escHtml(str) {
  if (typeof str !== 'string') return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function showToast(msg, isError) {
  var c = el('toastContainer');
  var d = document.createElement('div');
  d.className = 'toast ' + (isError ? 'err' : 'ok');
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(function() { if (d.parentNode) d.remove(); }, 3000);
}

function logMsg(msg) {
  var s = el('tbStatus');
  if (s) s.textContent = msg;
}

// ── State ──
var wizardState = {
  currentStep: 0,
  totalSteps: 5,
  data: {},
  chatHistory: {}
};
var currentAbort = null;
var statusData = {};
var currentMode = 'quick';
var outlineSaveTimer = null;
var editorAutosaveTimer = null;
var editorStartTime = Date.now();

// ── streamSSE ──
async function streamSSE(url, opts, onToken, onDone, onError, onStatus) {
  try {
    var resp = await fetch(url, opts);
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('data: ')) {
          var data = line.slice(6).trim();
          if (data === '[DONE]') {
            if (onDone) onDone();
            return;
          }
          try {
            var parsed = JSON.parse(data);
            var token = parsed.choices?.[0]?.delta?.content || parsed.delta?.content || parsed.content || parsed.text || '';
            if (token && onToken) onToken(token);
            if (parsed.type === 'error' && onError) onError(parsed.msg || '未知错误');
            if (parsed.type === 'done' && onDone) onDone(parsed);
            if (parsed.type === 'complete' && onDone) onDone(parsed);
            if (parsed.type === 'status' && onStatus) onStatus(parsed.msg);
          } catch(e) {}
        }
      }
    }
    if (onDone) onDone();
  } catch(e) {
    if (onError) onError(e.message);
  }
}

// ── llamaStream ──
function llamaStream(messages, onToken, onDone, onError, signal) {
  return streamSSE('http://localhost:61183/v1/chat/completions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'qwen3.6-27b-uncensored',
      messages: messages,
      stream: true,
      chat_template_kwargs: {enable_thinking: false}
    }),
    signal: signal
  }, onToken, onDone, onError);
}

// ── fetch helper ──
function apiGet(url) {
  return fetch(url).then(function(r) { return r.ok ? r.json() : null; }).catch(function(e) { showToast('请求失败: ' + e.message, true); return null; });
}

function apiPost(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(function(r) { return r.ok ? r.json() : null; }).catch(function(e) { showToast('请求失败: ' + e.message, true); return null; });
}

// ── loadStatus ──
function loadStatus() {
  apiGet('/api/status').then(function(r) {
    if (!r) return;
    statusData = r;
    renderChapterList(r);
    updateGateInfo(r);
    logMsg(r.connected ? '在线' : '离线');
  });
}

// ── loadStoryEngine ──
function loadStoryEngine() {
  apiGet('/api/story-engine').then(function(r) {
    if (!r) return;
    var genres = r.genres || [];
    var styles = r.styles || [];
    var elGenre = el('selGenre');
    var elStyle = el('selStyle');
    var elWizGenre = el('wizGenre');
    var elWizStyle = el('wizStyle');
    if (elGenre) {
      elGenre.innerHTML = '';
      for (var i = 0; i < genres.length; i++) {
        elGenre.innerHTML += '<option value="' + escHtml(genres[i]) + '">' + escHtml(genres[i]) + '</option>';
      }
    }
    if (elStyle) {
      elStyle.innerHTML = '';
      for (var i = 0; i < styles.length; i++) {
        elStyle.innerHTML += '<option value="' + escHtml(styles[i]) + '">' + escHtml(styles[i]) + '</option>';
      }
    }
    if (elWizGenre) {
      elWizGenre.innerHTML = '';
      for (var i = 0; i < genres.length; i++) {
        elWizGenre.innerHTML += '<option value="' + escHtml(genres[i]) + '">' + escHtml(genres[i]) + '</option>';
      }
    }
    if (elWizStyle) {
      elWizStyle.innerHTML = '';
      for (var i = 0; i < styles.length; i++) {
        elWizStyle.innerHTML += '<option value="' + escHtml(styles[i]) + '">' + escHtml(styles[i]) + '</option>';
      }
    }
    // Engine info in left panel
    var ei = el('engineInfo');
    if (ei) {
      ei.innerHTML = '<div><b>体裁:</b> ' + escHtml(r.current_genre || '--') + '</div>' +
        '<div><b>风格:</b> ' + escHtml(r.current_style || '--') + '</div>' +
        '<div style="margin-top:4px;font-size:11px">' + escHtml(r.constraints || '') + '</div>';
    }
    // Wizard engine constraints
    var wizEc = el('wizEngineConstraints');
    if (wizEc) wizEc.textContent = r.constraints || '无特殊约束';
    // Outline constraints
    var oc = el('outlineConstraints');
    if (oc) oc.textContent = '约束: ' + (r.constraints || '无');
  });
}

// ── loadChapterList ──
function loadChapterList() {
  apiGet('/api/chapters').then(function(r) {
    if (!r) return;
    // r is array of volumes with chapters
    var cl = el('chapterList');
    if (!cl) return;
    var html = '';
    if (Array.isArray(r)) {
      for (var v = 0; v < r.length; v++) {
        var vol = r[v];
        var volLabel = vol.volume || ('第' + (v + 1) + '卷');
        html += '<div class="vol-header">' + escHtml(volLabel) + '</div>';
        var chs = vol.chapters || [];
        for (var c = 0; c < chs.length; c++) {
          var ch = chs[c];
          var chNum = ch.num || (c + 1);
          html += '<div class="chapter-item" onclick="loadChapter(\'' + escHtml(vol.volume || 'vol_01') + '\',' + chNum + ')">';
          html += '<span class="ch-num">#' + chNum + '</span>';
          html += '<span class="ch-title">' + escHtml(ch.title || '') + '</span>';
          html += '<span class="ch-words">' + (ch.words || 0) + '字</span>';
          html += '</div>';
        }
      }
    }
    cl.innerHTML = html || '<div style="padding:8px;color:var(--text3);font-size:12px">暂无章节</div>';
  });
}

// ── renderChapterList (from /api/status) ──
function renderChapterList(data) {
  var cl = el('chapterList');
  if (!cl) return;
  var chapters = data.chapters || [];
  if (chapters.length === 0) {
    cl.innerHTML = '<div style="padding:8px;color:var(--text3);font-size:12px">暂无章节</div>';
    return;
  }
  var html = '';
  // Group by volume
  var volMap = {};
  for (var i = 0; i < chapters.length; i++) {
    var ch = chapters[i];
    var v = ch.volume || 1;
    if (!volMap[v]) volMap[v] = [];
    volMap[v].push(ch);
  }
  var vols = Object.keys(volMap).sort(function(a,b) { return parseInt(a) - parseInt(b); });
  for (var vi = 0; vi < vols.length; vi++) {
    var vk = vols[vi];
    html += '<div class="vol-header">第' + vk + '卷</div>';
    var chs = volMap[vk];
    for (var ci = 0; ci < chs.length; ci++) {
      var ch = chs[ci];
      html += '<div class="chapter-item" onclick="loadChapter(' + ch.volume + ',' + ch.num + ')">';
      html += '<span class="ch-num">#' + ch.num + '</span>';
      html += '<span class="ch-title">' + escHtml(ch.title || '') + '</span>';
      html += '<span class="ch-words">' + (ch.words || 0) + '字</span>';
      html += '</div>';
    }
  }
  cl.innerHTML = html;
}

// ── updateGateInfo ──
function updateGateInfo(data) {
  var gi = el('gateInfo');
  if (!gi) return;
  var g = data.last_gate;
  if (g) {
    gi.innerHTML = '<div>评分: <b>' + (g.score || 0) + '分</b></div>' +
      '<div style="font-size:11px;color:var(--text2)">' + (g.verdict || '--') + ' · 第' + (g.round || 0) + '轮</div>';
  } else {
    gi.innerHTML = '<span style="color:var(--text3)">暂无评分</span>';
  }
  // Stat gate
  var sg = el('statGate');
  if (sg) sg.textContent = (g && g.score) ? (g.score + '分 ' + (g.verdict || '')) : '--';
}

// ── loadChapter ──
function loadChapter(vol, ch) {
  apiGet('/api/chapters/read?vol=vol_' + String(vol).padStart(2,'0') + '&num=' + ch).then(function(r) {
    if (!r) return;
    var ta = el('editorTextarea');
    if (ta) {
      ta.value = r.content || '';
      onEditorInput();
    }
    el('selVolume').value = vol;
    el('selChapter').value = ch;
    showToast('已加载 第' + vol + '卷第' + ch + '章');
  });
}

// ── doGenerate ──
function doGenerate() {
  var vol = parseInt(el('selVolume').value) || 1;
  var ch = parseInt(el('selChapter').value) || 1;
  var mode = currentMode;
  var ta = el('editorTextarea');
  if (!ta) return;

  if (currentAbort) {
    currentAbort.abort();
    currentAbort = null;
  }

  // Show pause button
  el('btnPause').style.display = '';

  var ac = new AbortController();
  currentAbort = ac;
  ta.value = '';
  logMsg('生成中 V' + vol + 'C' + ch + '...');
  var fullText = '';

  fetch('/api/write-stream?mode=' + mode, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({volume: vol, chapter: ch}),
    signal: ac.signal
  }).then(function(resp) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function readChunk() {
      reader.read().then(function(result) {
        if (result.done) {
          el('btnPause').style.display = 'none';
          currentAbort = null;
          logMsg('生成完成');
          showToast('生成完成: ' + fullText.length + '字');
          return;
        }
        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line.startsWith('data: ')) continue;
          try {
            var d = JSON.parse(line.slice(6));
            if (d.type === 'stream' || d.type === 'token') {
              fullText += d.text || d.token || '';
              ta.value = fullText;
              ta.scrollTop = ta.scrollHeight;
              updateWordCount();
            } else if (d.type === 'done' || d.type === 'complete') {
              ta.value = fullText;
              updateWordCount();
              var wc = d.words || fullText.length;
              el('statWords').textContent = wc;
              el('statGate').textContent = d.gate_verdict || '--';
              el('selChapter').value = ch + 1;
              showToast('完成: ' + wc + '字');
              logMsg('完成 V' + vol + 'C' + ch + ' (' + wc + '字)');
            } else if (d.type === 'error') {
              showToast('错误: ' + d.msg, true);
              logMsg('错误: ' + d.msg);
            } else if (d.type === 'agent_progress') {
              logMsg('Agent: ' + d.stage + ' ' + Math.round(d.progress * 100) + '%');
            } else if (d.type === 'status') {
              logMsg(d.msg);
            } else if (d.type === 'agent_result') {
              fullText = ta.value; // keep what we have
            }
          } catch(e) {}
        }
        readChunk();
      }).catch(function(e) {
        if (e.name === 'AbortError') return;
        showToast('读取失败: ' + e.message, true);
        el('btnPause').style.display = 'none';
        currentAbort = null;
      });
    }
    readChunk();
  }).catch(function(e) {
    if (e.name === 'AbortError') return;
    showToast('生成失败: ' + e.message, true);
    el('btnPause').style.display = 'none';
    currentAbort = null;
  });
}

// ── doRewrite ──
function doRewrite() {
  var ta = el('editorTextarea');
  if (!ta) return;
  var sel = ta.value.substring(ta.selectionStart, ta.selectionEnd);
  if (!sel) {
    showToast('请先选中要改写的文本', true);
    return;
  }
  var prompt = prompt('输入改写要求（风格、语气等）:');
  if (!prompt) return;

  showToast('改写中...');
  var ac = new AbortController();
  currentAbort = ac;
  var rewritten = '';

  fetch('/api/deai-rewrite', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text: sel, prompt: prompt}),
    signal: ac.signal
  }).then(function(resp) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function readChunk() {
      reader.read().then(function(result) {
        if (result.done) {
          // Replace selection
          ta.value = ta.value.substring(0, ta.selectionStart) + rewritten + ta.value.substring(ta.selectionEnd);
          currentAbort = null;
          updateWordCount();
          showToast('改写完成');
          return;
        }
        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line.startsWith('data: ')) continue;
          try {
            var d = JSON.parse(line.slice(6));
            var text = d.text || d.token || d.content || '';
            if (text) rewritten += text;
          } catch(e) {}
        }
        readChunk();
      }).catch(function(e) {
        if (e.name === 'AbortError') return;
        showToast('改写失败: ' + e.message, true);
        currentAbort = null;
      });
    }
    readChunk();
  }).catch(function(e) {
    if (e.name === 'AbortError') return;
    showToast('改写请求失败: ' + e.message, true);
    currentAbort = null;
  });
}

function showWizard() {
  el('wizardOverlay').classList.remove('hidden');
  goWizardStep(wizardState.currentStep);
}

  el('wizardOverlay').classList.add('hidden');
}

  var wo = el('wizardOverlay');

function goWizardStep(n) {
  if (n < 0) n = 0;
  if (n >= wizardState.totalSteps) {
    hideWizard();
    return;
  }
  collectStepData(wizardState.currentStep);
  wizardState.currentStep = n;

  // Update dots
  for (var i = 0; i < wizardState.totalSteps; i++) {
    var dot = el('wsd-' + i);
    if (!dot) continue;
    dot.className = 'wiz-step-dot';
    if (i < n) dot.classList.add('done');
    else if (i === n) dot.classList.add('active');
    // also set text
    dot.textContent = i < n ? '✓' : (i + 1);
  }

  // Update step content
  for (var i = 0; i < wizardState.totalSteps; i++) {
    var step = el('wizs-' + i);
    if (step) step.classList.toggle('active', i === n);
  }

  // Update buttons
  el('wizPrev').style.display = n === 0 ? 'none' : '';
  el('wizSkip').style.display = n < wizardState.totalSteps - 1 ? '' : 'none';
  var nextBtn = el('wizNext');
  if (n === wizardState.totalSteps - 1) {
    nextBtn.textContent = '✅ 完成';
    nextBtn.onclick = hideWizard;
  } else {
    nextBtn.textContent = '→ 下一步';
    nextBtn.onclick = function() { goWizardStep(wizardState.currentStep + 1); };
  }
}

function handleWizardNext() {
  if (wizardState.currentStep >= wizardState.totalSteps - 1) {
    hideWizard();
  } else {
    goWizardStep(wizardState.currentStep + 1);
  }
}

function collectStepData(step) {
  var key = getStepKey(step);
  var data = {};
  if (step === 0) {
    data.bookName = el('wizBookName') ? el('wizBookName').value : '';
    data.genre = el('wizGenre') ? el('wizGenre').value : '';
    data.style = el('wizStyle') ? el('wizStyle').value : '';
    data.blurb = el('wizBlurb') ? el('wizBlurb').value : '';
  } else if (step === 1) {
    data.world = el('wizWorldOutput') ? el('wizWorldOutput').textContent : '';
  } else if (step === 2) {
    data.power = el('wizPowerOutput') ? el('wizPowerOutput').textContent : '';
  } else if (step === 3) {
    data.protagonist = el('wizCharOutput') ? el('wizCharOutput').textContent : '';
  } else if (step === 4) {
    data.outline = el('wizOutline') ? el('wizOutline').value : '';
  }
  wizardState.data[key] = data;
}

function getStepKey(step) {
  var keys = ['start', 'world', 'power', 'character', 'outline'];
  return keys[step] || 'start';
}

  input.value = '';

  if (!wizardState.chatHistory[stepKey]) wizardState.chatHistory[stepKey] = [];

  var msgsEl = el('wizChat-' + stepKey);
  if (msgsEl) {
    msgsEl.innerHTML += '<div class="wiz-chat-msg user">' + escHtml(msg) + '</div>';

  var chatHistory = [];
  for (var i = 0; i < wizardState.chatHistory[stepKey].length; i++) {
    chatHistory.push(wizardState.chatHistory[stepKey][i]);
  }
  chatHistory.unshift({role: 'system', content: '你是一个专业的网文创作顾问助手。'});

  var aiMsgEl = msgsEl;
  var aiDiv = document.createElement('div');
  aiDiv.className = 'wiz-chat-msg ai';
  aiDiv.textContent = '...';
  if (aiMsgEl) aiMsgEl.appendChild(aiDiv);

  var full = '';
  llamaStream(chatHistory, function(token) {
    full += token;
    aiDiv.textContent = full;
    if (aiMsgEl) aiMsgEl.scrollTop = aiMsgEl.scrollHeight;
  }, function() {
    wizardState.chatHistory[stepKey].push({role: 'assistant', content: full});

    enemy: {title:'引入新敌', prompt:'一个突然出现的新敌人针对主角。写出这个敌人的第一次出场——他的动机、他的能力、他为什么针对主角。200-300字。'},

    betray: {title:'盟友反水', prompt:'一个重要配角突然背叛主角。写出背叛发生的那一刻——主角的反应、背叛者的台词、背后的动机。200-300字。'}
  };
  var c = conflictMap[type] || conflictMap.secret;
  out.textContent = '生成中...';
  llamaStream([
    {role: 'system', content: '你是网文创作顾问。基于当前体裁(' + genre + ')，写一段具体场景。场景中不要用概括性描述，要用具体的动作、对话和环境细节来呈现冲突。'},
    {role: 'user', content: c.prompt}
  ], function(token) {
    if (out.textContent === '生成中...') out.textContent = '';
    out.textContent += token;
  }, function() { showToast(c.title + ' — 已生成'); },
  function(err) { showToast('生成失败: ' + err, true); });
}

// ── Module 4: 钩子工坊（上下文感知） ──
function generateHook(type) {
  var out = el('hookOutput');
  if (!out) return;
  var genre = el('selGenre') ? el('selGenre').value : '玄幻';
  var context = el('editorTextarea') ? el('editorTextarea').value.substring(el('editorTextarea').value.length - 500) : '';
  var hookMap = {
    action: '生成3个"行动预告型"章末钩子——告诉读者主角下一步要做什么大事，制造期待。每个50字以内。',
    suspense: '生成3个"悬念型"章末钩子——透露一个危险或秘密正在逼近，但不揭示真相。每个50字以内。',
    twist: '生成3个"反转预告型"章末钩子——暗示接下来会有一个意想不到的转折。每个50字以内。',
    auto: '生成3个最合适的章末钩子，混合行动预告、悬念和反转。每个50字以内。'
  };
  var prompt = hookMap[type] || hookMap.auto;
  if (context && context.length > 50) prompt += '\n当前章节末尾内容：' + context.substring(context.length - 300);
  out.textContent = '生成钩子...';
  llamaStream([
    {role: 'system', content: '你是网文创作顾问，擅长写章节末尾的钩子。当前体裁：' + genre + '。钩子要简短有力，制造期待感。'},
    {role: 'user', content: prompt}
  ], function(token) {
    if (out.textContent === '生成钩子...') out.textContent = '';
    out.textContent += token;
  }, function() { showToast('钩子生成完成'); },
  function(err) { showToast('生成失败: ' + err, true); });
}

// ── Module 5: 剧情翻新器 ──
function generateFlip() {
  var input = el('flipInput');
  var out = el('flipOutput');
  if (!out) return;
  var pattern = input && input.value.trim() ? input.value.trim() : '';
  if (!pattern) { showToast('请输入一个经典剧情模式', true); return; }
  var genre = el('selGenre') ? el('selGenre').value : '玄幻';
  out.textContent = '翻新中...';
  llamaStream([
    {role: 'system', content: '你是网文创作顾问。把经典剧情模式进行翻新：保留核心冲突框架，但翻转2-3个关键要素（比如好人变坏人、陷阱变机遇、弱者变强者），给出一个全新的剧情版本。200-400字。基于当前体裁：' + genre},
    {role: 'user', content: '经典模式：' + pattern + '\n请给出翻新后的剧情：'}
  ], function(token) {
    if (out.textContent === '翻新中...') out.textContent = '';
    out.textContent += token;
  }, function() { showToast('翻新完成'); },
  function(err) { showToast('翻新失败: ' + err, true); });
}

function loadQualityGate() {
  apiGet('/api/quality-gate').then(function(r) {
    if (!r) return;
    var scoreEl = el('qgScore');
    var detailEl = el('qgDetail');
    if (scoreEl) scoreEl.textContent = (r.score || r.overall_score || '--') + '分';
    if (detailEl) detailEl.textContent = r.verdict || r.summary || '无详细信息';
  });
}

// ── Inspire Chat ──
var inspireChatHistory = [];
function inspireChatSend() {
  var input = el('inspireChatInput');
  if (!input || !input.value.trim()) return;
  var msg = input.value.trim();
  input.value = '';

  var msgsEl = el('inspireChatMsgs');
  if (msgsEl) {
    msgsEl.innerHTML += '<div class="chat-msg user">' + escHtml(msg) + '</div>';
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  inspireChatHistory.push({role: 'user', content: msg});

  var history = [{role: 'system', content: '你是一个专业的网文创作助手，帮助作者构思和优化故事。'}];
  for (var i = 0; i < inspireChatHistory.length; i++) {
    history.push(inspireChatHistory[i]);
  }

  var aiDiv = document.createElement('div');
  aiDiv.className = 'chat-msg ai';
  aiDiv.textContent = '...';
  if (msgsEl) msgsEl.appendChild(aiDiv);

  var full = '';
  fetch('/api/workshop/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({messages: history})
  }).then(function(resp) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function readChunk() {
      reader.read().then(function(result) {
        if (result.done) {
          inspireChatHistory.push({role: 'assistant', content: full});
          return;
        }
        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line.startsWith('data: ')) continue;
          try {
            var d = JSON.parse(line.slice(6));
            var token = d.text || d.token || d.content || '';
            if (token) full += token;
          } catch(e) {}
        }
        aiDiv.textContent = full;
        if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
        readChunk();
      }).catch(function(e) {
        aiDiv.textContent = '错误: ' + e.message;
      });
    }
    readChunk();
  }).catch(function(e) {
    aiDiv.textContent = '请求失败: ' + e.message;
  });
}

// ── Actions ──
function doSaveSnapshot() {
  apiPost('/api/snapshots', {label: new Date().toLocaleString()}).then(function(r) {
    if (r && r.ok) showToast('快照已保存');
    else showToast('快照保存失败', true);
  });
}

function doExport() {
  apiPost('/api/export', {format: 'epub'}).then(function(r) {
    if (r) showToast('导出成功: ' + (r.path || ''));
    else showToast('导出失败', true);
  });
}

function doAnalyze() {
  apiGet('/api/analyze').then(function(r) {
    if (r && r.report) {
      showToast(r.report.total_chapters + '章 ' + (r.report.total_words || 0).toLocaleString() + '字 ' + ((r.report.pacing_issues || []).length) + '节奏问题');
    }
  });
}

function doContinuity() {
  apiGet('/api/continuity').then(function(r) {
    if (r) showToast('检查完成: ' + ((r.findings || r.issues || []).length) + '个发现');
  });
}

// ── New Chapter Modal ──
function showNewChapterModal() {
  el('newChapterModal').classList.remove('hidden');
  el('ncVolume').value = el('selVolume').value;
  el('ncChapter').value = parseInt(el('selChapter').value) + 1;
}

function hideNewChapterModal() {
  el('newChapterModal').classList.add('hidden');
}

function confirmNewChapter() {
  var vol = parseInt(el('ncVolume').value) || 1;
  var ch = parseInt(el('ncChapter').value) || 1;
  el('selVolume').value = vol;
  el('selChapter').value = ch;
  hideNewChapterModal();
  doGenerate();
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    doGenerate();
  }
});

// ── Init ──
(function init() {
  loadStoryEngine();
  loadStatus();
  loadChapterList();
  loadQualityGate();
  loadForeshadowStats();

  // Restore draft from localStorage
  var draft = localStorage.getItem('novel_claude_draft');
  if (draft) {
    var ta = el('editorTextarea');
    if (ta) {
      ta.value = draft;
      updateWordCount();
    }
  }

  // Timer: refresh status every 15s
  setInterval(function() {
    loadStatus();
  }, 15000);

  // Timer: editor autosave check (for external changes)
  setInterval(function() {
    if (document.hasFocus()) return;
    var ta = el('editorTextarea');
    if (ta && ta.value) {
      localStorage.setItem('novel_claude_draft', ta.value);
    }
  }, 30000);

  // Wire outline textarea autosave
  var outlineTa = el('outlineText');
  if (outlineTa) {
    outlineTa.addEventListener('input', onOutlineInput);
    // Load outline content
    apiGet('/api/outline').then(function(r) {
      if (r && r.outline) outlineTa.value = r.outline;
    });
  }

  logMsg('就绪');
})();
</script>
